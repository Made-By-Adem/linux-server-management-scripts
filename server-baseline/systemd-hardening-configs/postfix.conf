[Service]
# Systemd hardening for Postfix mail server
# Reduces security exposure significantly

# Isolation
PrivateDevices=yes

# Filesystem Protection
ProtectSystem=strict
ReadWritePaths=/var/spool/postfix /var/lib/postfix /var/mail /var/log

# Kernel Protection
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectKernelLogs=yes
ProtectControlGroups=yes

# Privilege Management
RestrictSUIDSGID=yes

# Network
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6

# Capabilities (Postfix needs some capabilities for mail delivery)
CapabilityBoundingSet=CAP_DAC_OVERRIDE CAP_SETUID CAP_SETGID CAP_CHOWN CAP_FOWNER CAP_NET_BIND_SERVICE
AmbientCapabilities=

# System Calls
SystemCallFilter=@system-service
SystemCallFilter=~@privileged @resources
SystemCallErrorNumber=EPERM
SystemCallArchitectures=native

# Restrict Namespaces
RestrictNamespaces=yes

# Restrict Realtime
RestrictRealtime=yes

# Prevent new privileges through execve
LockPersonality=yes

# Remove write and execute permissions from loaded memory
MemoryDenyWriteExecute=no

# Protect hostname
ProtectHostname=yes

# Protect clock
ProtectClock=yes

# Hide /proc files
ProtectProc=invisible
ProcSubset=pid
