[Service]
# Systemd hardening for Rsyslog
# Reduces security exposure significantly

# Isolation
PrivateDevices=yes

# Filesystem Protection
ProtectSystem=strict
ReadWritePaths=/var/log /var/spool/rsyslog /run/rsyslog

# Kernel Protection
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectKernelLogs=no
ProtectControlGroups=yes

# Privilege Management
RestrictSUIDSGID=yes

# Network (rsyslog may receive logs over network)
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK

# Capabilities
CapabilityBoundingSet=CAP_DAC_READ_SEARCH CAP_SYSLOG CAP_NET_BIND_SERVICE CAP_SETUID CAP_SETGID
AmbientCapabilities=

# System Calls
SystemCallFilter=@system-service
SystemCallFilter=~@privileged @resources @obsolete
SystemCallErrorNumber=EPERM
SystemCallArchitectures=native

# Restrict Namespaces
RestrictNamespaces=yes

# Restrict Realtime
RestrictRealtime=yes

# Prevent new privileges through execve
LockPersonality=yes

# Memory Protection
MemoryDenyWriteExecute=no

# Protect hostname
ProtectHostname=yes

# Protect clock
ProtectClock=yes
