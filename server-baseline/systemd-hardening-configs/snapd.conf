[Service]
# Systemd hardening for Snapd
# Reduces security exposure significantly

# Filesystem Protection
ProtectSystem=strict
ReadWritePaths=/var/lib/snapd /snap /run/snapd /var/snap /var/cache/snapd /var/log /tmp

# Kernel Protection
ProtectKernelTunables=yes
ProtectKernelModules=no
ProtectKernelLogs=yes
ProtectControlGroups=no

# Privilege Management (snapd needs elevated privileges for package management)
RestrictSUIDSGID=no

# Network (snapd downloads snaps from the store)
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK

# System Calls (snapd needs broad syscall access)
SystemCallFilter=@system-service
SystemCallArchitectures=native

# Restrict Realtime
RestrictRealtime=no

# Prevent personality changes
LockPersonality=yes

# Protect hostname
ProtectHostname=no

# Protect clock
ProtectClock=yes

# Note: Snapd is a package manager with containerization features
# Many restrictions cannot be applied without breaking snap functionality
# Consider disabling snapd completely if not needed for better security
