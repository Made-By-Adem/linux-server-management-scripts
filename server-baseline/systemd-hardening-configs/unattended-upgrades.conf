[Service]
# Systemd hardening for Unattended Upgrades
# Reduces security exposure significantly

# Filesystem Protection
ProtectSystem=strict
ReadWritePaths=/var/lib/unattended-upgrades /var/log/unattended-upgrades /var/cache/apt /var/lib/apt /var/lib/dpkg /etc/apt

# Kernel Protection
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectKernelLogs=yes
ProtectControlGroups=yes

# Privilege Management (unattended-upgrades needs to install packages)
RestrictSUIDSGID=no

# Network (needs to download packages)
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6

# System Calls (needs broad access for package installation)
SystemCallFilter=@system-service
SystemCallErrorNumber=EPERM
SystemCallArchitectures=native

# Restrict Namespaces
RestrictNamespaces=yes

# Restrict Realtime
RestrictRealtime=yes

# Prevent personality changes
LockPersonality=yes

# Protect hostname
ProtectHostname=yes

# Protect clock
ProtectClock=yes

# Note: unattended-upgrades requires elevated privileges for package management
# Some restrictions are intentionally relaxed compared to other services
