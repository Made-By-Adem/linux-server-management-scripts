[Service]
# Systemd hardening for Containerd
# Reduces security exposure significantly

# Filesystem Protection
ProtectSystem=strict
ReadWritePaths=/var/lib/containerd /run/containerd /var/log

# Kernel Protection
ProtectKernelTunables=yes
ProtectKernelModules=no
ProtectKernelLogs=yes
ProtectControlGroups=no

# Privilege Management (containerd needs privileges for container management)
RestrictSUIDSGID=no

# Network (containers need network access)
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK

# System Calls (containerd needs broad syscall access for containers)
SystemCallFilter=@system-service
SystemCallArchitectures=native

# Restrict Realtime
RestrictRealtime=no

# Prevent personality changes
LockPersonality=yes

# Protect hostname
ProtectHostname=no

# Protect clock
ProtectClock=yes

# Note: containerd is a container runtime and requires elevated privileges
# Many restrictions cannot be applied without breaking container functionality
